<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rede Social</title>
</head>
<body>

    <div id="wrapper">

        <div id="container">
            <div class="column left">
                <div class="main"></div>

            </div>

            <div class="column right">
                <div class="login-panel">
                    <div class="logo">
                        <img class="logo-img" src="assets/logo.png" alt="logo">
                    </div>
                    <form action="feed.html">
                        <input placeholder="Telefone, usuario ou email" type="text" name="username">
                        <input type="password" placeholder="senha" name="password">
                        <input type="submit" value="Entrar">
                    </form>
                </div>

                <div class="infobox">
                    <p>Não possui uma conta? <a href="singup.html">Cadastre-se</a></p>
                </div>

                <div class="get-app-panel">
                    Obetenha o aplicativo.
                    <div class="app-buttons">
                        <a href="#">
                            <img src="assets/appstore.png" alt="AppStore">
                        </a>
                        <a href="#">
                            <img src="assets/googleplay.png" alt="GooglePay">
                        </a>
                    </div>
                </div>

            </div>

        </div>

        <footer>
            <div class="footer-inner">
                <a href="#">About us</a>
                <a href="#">Support</a>
                <a href="#">Blog</a>
                <a href="#">API</a>
                <a href="#">Jobs</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Directory</a>
                <a href="#">Profiles</a>
                <a href="#">Hashtags</a>
                <a href="#">Language</a>
                <div class="text-smal">@ 2022 Instagram</div>
            </div>
        </footer>

    </div>
    
</body>
</html>
