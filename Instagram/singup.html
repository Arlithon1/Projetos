<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>
</head>
<body>

    <div id="wrapper">

        <div id="container-singup">

            <div class="column">
                <div class="login-panel">
                    <div class="logo">
                        <img class="logo-img" src="assets/logo-instagram.png" alt="logo">
                    </div>

                    <div class="massage">
                        <span>Cadastre-se para ver fotos e videos dos seus amigos.</span>
                    </div>

                    <button class="cta-button">
                        Entrar com Facebook
                    </button>

                    <div class="divisor-container">
                        <div class="line"></div>
                        <div class="divisor-tag">ou</div>
                        <div class="line"></div>
                    </div>

                    <form action="feed.html">
                        <input placeholder="Número de celular ou email" type="text" name="email" required>
                        <input placeholder="Nome Completo" type="text" name="name" required>
                        <input placeholder="Username" type="text" name="username" required>
                        <input type="password" placeholder="senha" name="password" required>

                        <input type="submit" value="Entrar">
                    </form>
                </div>

                <div class="infobox">
                    <p>Tem uma conta? <a href="index.html">Login</a></p>
                </div>

                <div class="get-app-panel">
                    Obetenha o aplicativo.
                    <div class="app-buttons">
                        <a href="#">
                            <img src="assets/appstore.png" alt="AppStore">
                        </a>
                        <a href="#">
                            <img src="assets/googleplay.png" alt="GooglePay">
                        </a>
                    </div>
                </div>

            </div>

        </div>

        <footer>
            <div class="footer-inner">
                <a href="#">About us</a>
                <a href="#">Support</a>
                <a href="#">Blog</a>
                <a href="#">API</a>
                <a href="#">Jobs</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Directory</a>
                <a href="#">Profiles</a>
                <a href="#">Hashtags</a>
                <a href="#">Language</a>
                <div class="text-smal">@ 2022 Instagram</div>
            </div>
        </footer>

    </div>
    
</body>
</script>
</html>
